<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Planner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 300px;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 8px;
      margin-right: 5px;
    }

    button {
      padding: 8px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      background: #eee;
      margin: 5px 0;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      border-radius: 5px;
    }

    .delete {
      color: red;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Planner</h1>
  <input type="text" id="taskInput" placeholder="Add task...">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
  function addTask() {
    const input = document.getElementById('taskInput');
    const taskText = input.value.trim();

    if (taskText === '') return;

    const li = document.createElement('li');
    li.innerHTML = `${taskText} <span class="delete" onclick="deleteTask(this)">X</span>`;

    document.getElementById('taskList').appendChild(li);

    input.value = '';
  }

  function deleteTask(element) {
    element.parentElement.remove();
  }
</script>

</body>
</html>
